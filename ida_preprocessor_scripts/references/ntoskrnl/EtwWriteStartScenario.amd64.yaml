        if ( status >= 0 )
        {
          if ( ActivityId->Data1
            || ActivityId->Data2
            || ActivityId->Data3
            || ActivityId->Data4[0]
            || ActivityId->Data4[1]
            || ActivityId->Data4[2]
            || ActivityId->Data4[3]

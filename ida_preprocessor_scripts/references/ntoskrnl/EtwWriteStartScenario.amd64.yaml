            || ActivityId->Data4[7]
            || (status = ZwTraceControl(12, 0, 0, ActivityId, 16), status >= 0) )
          {
            status = EtwWrite((REGHANDLE)RegHandle, EventDescriptor, ActivityId, UserDataCount, a5);
            WdipStartEndScenario((__int64)&v11, (__int64)ActivityId, &EventDescriptor->Id, 10);

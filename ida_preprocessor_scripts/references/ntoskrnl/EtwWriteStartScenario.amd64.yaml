  __int64 __fastcall EtwWriteStartScenario(
          _ETW_REG_ENTRY *RegHandle,
          PCEVENT_DESCRIPTOR EventDescriptor,
          LPCGUID ActivityId,
          ULONG UserDataCount,
          PEVENT_DATA_DESCRIPTOR a5)
  {
    int status; // edi
